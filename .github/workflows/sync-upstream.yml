name: Sync Upstream (InstaCRUD)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/esng-one/instacrud.git
          git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          COUNT=$(git rev-list --count HEAD..upstream/main)
          UPSTREAM_SHA=$(git rev-parse --short upstream/main)
          echo "new_commits=$COUNT" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -eq "0" ]; then
            echo "Already up to date with upstream. Nothing to do."
          else
            echo "Found $COUNT new commit(s) from upstream (tip: $UPSTREAM_SHA)."
          fi

      - name: Check if sync branch already exists
        if: steps.check.outputs.new_commits != '0'
        id: branch_check
        run: |
          BRANCH_NAME="upstream/merge-$(date +%Y-%m-%d)"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null 2>&1; then
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
            echo "Branch $BRANCH_NAME already exists — skipping."
          else
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and merge upstream
        if: >
          steps.check.outputs.new_commits != '0' &&
          steps.branch_check.outputs.branch_exists == 'false'
        id: merge
        run: |
          BRANCH_NAME="${{ steps.branch_check.outputs.branch_name }}"
          git checkout -b "$BRANCH_NAME"

          # Keep local GitHub Actions workflows exactly as-is.
          preserve_local_workflows() {
            git restore --source=HEAD --staged --worktree .github/workflows 2>/dev/null || true
            git checkout --ours -- .github/workflows 2>/dev/null || true
            git add .github/workflows 2>/dev/null || true
          }

          if git merge upstream/main --no-edit --no-commit --allow-unrelated-histories; then
            preserve_local_workflows

            if ! git diff --cached --quiet; then
              git commit -m "chore: merge upstream/main"
            fi

            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            echo "Merge completed with no conflicts."
          else
            echo "Merge conflicts detected — staging files with conflict markers."

            preserve_local_workflows

            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "chore: merge upstream/main — conflicts require manual resolution"
            fi
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
          fi

          git push origin "$BRANCH_NAME"

      - name: Ensure Pull Request Exists
        if: steps.check.outputs.new_commits != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          BRANCH_NAME="${{ steps.branch_check.outputs.branch_name }}"
          BRANCH_EXISTS="${{ steps.branch_check.outputs.branch_exists }}"
          HAS_CONFLICTS="${{ steps.merge.outputs.has_conflicts }}"
          UPSTREAM_SHA="${{ steps.check.outputs.upstream_sha }}"

          EXISTING_PR_URL=$(gh pr list \
            --state open \
            --base main \
            --head "$BRANCH_NAME" \
            --json url \
            --jq '.[0].url')

          if [ -n "$EXISTING_PR_URL" ]; then
            echo "PR already exists: $EXISTING_PR_URL"
            echo "::notice::Existing PR: $EXISTING_PR_URL"
            exit 0
          fi

          if [ "$BRANCH_EXISTS" = "true" ] && [ -z "$HAS_CONFLICTS" ]; then
            # Infer conflict state from the latest merge commit message on the remote sync branch.
            git fetch origin "$BRANCH_NAME"
            if git show -s --format=%B "origin/$BRANCH_NAME" | grep -q "conflicts require manual resolution"; then
              HAS_CONFLICTS="true"
            else
              HAS_CONFLICTS="false"
            fi
          fi

          if [ "$HAS_CONFLICTS" = "true" ]; then
            TITLE="chore: sync upstream ${UPSTREAM_SHA} ($(date +%Y-%m-%d)) — merge conflicts need resolution"
            BODY="## Upstream Sync\n\nThis PR merges changes from [esng-one/instacrud-proto](https://github.com/esng-one/instacrud-proto) up to commit \`${UPSTREAM_SHA}\`.\n\n> ⚠️ **Merge conflicts detected.** The commit on this branch contains conflict markers — resolve them before merging.\n\n### Steps to resolve\n\`\`\`bash\ngit fetch origin\ngit checkout ${BRANCH_NAME}\n# Edit files containing <<<<<<< / ======= / >>>>>>>\ngit add .\ngit commit -m \"chore: resolve upstream merge conflicts\"\ngit push origin ${BRANCH_NAME}\n\`\`\`"
          else
            TITLE="chore: sync upstream ${UPSTREAM_SHA} ($(date +%Y-%m-%d))"
            BODY="## Upstream Sync\n\nThis PR merges changes from [esng-one/instacrud-proto](https://github.com/esng-one/instacrud-proto) up to commit \`${UPSTREAM_SHA}\`.\n\nNo conflicts detected — safe to review and merge."
          fi

          create_pr() {
            gh pr create \
              --title "$TITLE" \
              --body "$(printf '%b' "$BODY")" \
              --base main \
              --head "$BRANCH_NAME"
          }

          if ! create_pr; then
            echo "::warning::Unable to create PR with github.token (Resource not accessible by integration)."

            if [ -n "$GH_PAT" ]; then
              echo "Retrying PR creation with GH_PAT..."
              if GH_TOKEN="$GH_PAT" create_pr; then
                echo "::notice::PR created successfully using GH_PAT."
                exit 0
              fi
              echo "::warning::Retry with GH_PAT failed as well."
            fi

            echo "::warning::Push succeeded. Create the PR manually, or set/verify repository secret GH_PAT with repo scope."
            echo "::notice::Compare URL: https://github.com/${{ github.repository }}/compare/main...${BRANCH_NAME}?expand=1"
          fi
